{% load i18n %}
<div id="shared-boost-ad-modal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-gray-800 dark:border-gray-700">
            <div class="flex items-center justify-between p-4 border-b rounded-t dark:border-gray-600">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                    {% trans "Boost Ad" %}
                </h3>
                <button type="button" id="shared-boost-ad-modal-close" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            
            <form id="shared-boost-ad-form" action="" method="post">
                {% csrf_token %}
                <div class="p-4 space-y-4">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        {% trans "Ad boosting costs" %} <strong class="text-gray-900 dark:text-white">3.9 TND HT</strong> {% trans "per day. Please select the date range for your ad boost." %}
                    </p>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="boost_ad_start_date" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{% trans "Start Date" %}</label>
                            <input type="date" name="start_date" id="boost_ad_start_date" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-brand focus:border-brand block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white">
                        </div>
                        <div>
                            <label for="boost_ad_end_date" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{% trans "End Date" %}</label>
                            <input type="date" name="end_date" id="boost_ad_end_date" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-brand focus:border-brand block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white">
                        </div>
                    </div>
                    
                    <div class="bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 p-3 rounded-lg text-xs mt-2" id="ad-boost-price-info">
                        {% trans "Select a start and end date to calculate the total price." %}
                    </div>

                    <h4 class="font-medium text-gray-900 dark:text-white mt-4 mb-2">{% trans "Payment Method" %}</h4>
                    <div class="space-y-2">
                        <label class="flex items-center justify-between p-3 border border-brand rounded-lg cursor-pointer bg-brand/5">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="payment_method" value="bank" class="w-4 h-4 text-brand bg-gray-100 border-gray-300 focus:ring-brand" checked>
                                <svg class="w-5 h-5 text-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21h18M4 18h16M6 10v8m4-8v8m4-8v8m4-8v8M12 4 4 9h16l-8-5Z"/>
                                </svg>
                                <span class="font-medium text-brand text-sm">{% trans "Bank Transfer" %}</span>
                            </div>
                        </label>

                        <label class="flex items-center justify-between p-3 border border-gray-200 rounded-lg cursor-not-allowed bg-gray-50 opacity-70 dark:border-gray-700 dark:bg-gray-800">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="payment_method" value="card" class="w-4 h-4 text-gray-400 bg-gray-200 border-gray-300" disabled>
                                <svg class="w-5 h-5 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M6 14h2m3 0h5M3 7v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1Z"/>
                                </svg>
                                <span class="font-medium text-gray-500 text-sm">{% trans "Credit Card" %}</span>
                            </div>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-400">{% trans "Coming Soon" %}</span>
                        </label>
                    </div>
                </div>
                
                <div class="flex items-center p-4 border-t border-gray-200 rounded-b dark:border-gray-600 gap-3">
                    <button type="submit" class="text-white bg-brand hover:bg-brand-strong focus:ring-4 focus:outline-none focus:ring-brand-medium font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                        {% trans "Confirm Transfer Request" %}
                    </button>
                    <button type="button" id="shared-boost-ad-modal-decline" class="text-gray-500 bg-white hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-brand-medium rounded-lg border border-gray-200 text-sm font-medium px-5 py-2.5 hover:text-gray-900 focus:z-10 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-500 dark:hover:text-white dark:hover:bg-gray-600">
                        {% trans "Cancel" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const modalEl = document.getElementById('shared-boost-ad-modal');
    if (!modalEl) return;

    if (typeof Modal !== 'undefined') {
        const modal = new Modal(modalEl, { backdrop: 'static' });
        const formEl = document.getElementById('shared-boost-ad-form');

        // Set min dates to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('boost_ad_start_date').min = today;
        document.getElementById('boost_ad_end_date').min = today;

        function calculatePrice() {
            const startDateStr = document.getElementById('boost_ad_start_date').value;
            const endDateStr = document.getElementById('boost_ad_end_date').value;
            const priceInfo = document.getElementById('ad-boost-price-info');
            
            if (startDateStr && endDateStr) {
                const startDate = new Date(startDateStr);
                const endDate = new Date(endDateStr);
                const diffTime = Math.abs(endDate - startDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // Inclusive of start and end
                
                if (diffDays > 0) {
                    const priceHT = diffDays * 3.9;
                    const vat = priceHT * 0.19;
                    const timbre = 1.0;
                    const totalTTC = (priceHT + vat + timbre).toFixed(2);
                    
                    priceInfo.innerHTML = `{% trans "Duration" %}: <strong>${diffDays} {% trans "days" %}</strong>.<br>
                                           {% trans "Total TTC (including 19% VAT & 1 TND Timbre)" %}: <strong class="text-gray-900 dark:text-white">${totalTTC} TND</strong>`;
                }
            } else {
                priceInfo.innerHTML = `{% trans "Select a start and end date to calculate the total price." %}`;
            }
        }

        document.getElementById('boost_ad_start_date').addEventListener('change', function() {
            document.getElementById('boost_ad_end_date').min = this.value;
            if(document.getElementById('boost_ad_end_date').value < this.value) {
                document.getElementById('boost_ad_end_date').value = this.value;
            }
            calculatePrice();
        });

        document.getElementById('boost_ad_end_date').addEventListener('change', calculatePrice);

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('[data-boost-ad-url]');
            if (!btn) return;

            e.preventDefault();
            formEl.action = btn.getAttribute('data-boost-ad-url');
            modal.show();
        });

        document.getElementById('shared-boost-ad-modal-close').addEventListener('click', function() { modal.hide(); });
        document.getElementById('shared-boost-ad-modal-decline').addEventListener('click', function() { modal.hide(); });
    }
});
</script>
